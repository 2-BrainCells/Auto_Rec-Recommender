# settings.yaml
data:
  split_ratio: 0.20
  max_nan_ratio: 0.40

evaluation:
  top_k: 10
  relevant_rating_threshold: 0.6 # corresponds to 3/5
  diversity_min_similarity: 0.1

training:
  num_epochs: 20
  patience: 5
  dropout_rate: 0.2

hpo:
  n_trials: 100
  num_epochs: 50
  patience: 4
  search_space:
    hidden_dim: [8, 16, 32, 64, 128, 256, 512]
    batch_size: [16, 32, 64, 128, 256]
    lr_min: 0.0001
    lr_max: 0.01
    weight_decay_min: 0.00001
    weight_decay_max: 0.001